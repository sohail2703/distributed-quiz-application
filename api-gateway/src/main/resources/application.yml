server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: leaderboard-service
              uri: lb://LEADERBOARD-SERVICE
              predicates:
                - Path=/api/leaderboards/**

            - id: quiz-service
              uri: lb://quiz-service
              predicates:
                - Path=/api/quizzes/**

            - id: question-service
              uri: lb://question-service
              predicates:
                - Path=/api/questions/**
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

eureka:
  instance:
    hostname: localhost

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true

    fetch-registry: true